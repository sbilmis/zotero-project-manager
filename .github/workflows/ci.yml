name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest

  package:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install packaging tools
        run: python -m pip install build twine
      - name: Build wheel and source distribution
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*

  zotero-plugin:
    name: Zotero 9 companion plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Check JavaScript and run plugin tests
        run: node --check zotero-plugin/bootstrap.js && node --check zotero-plugin/zpm.js && node --check zotero-plugin/preferences.js && node --test zotero-plugin/tests/*.test.cjs
      - name: Build companion plugin
        run: python scripts/build_zotero_plugin.py
      - name: Verify XPI contents
        run: unzip -t dist/zpm-zotero-*.xpi
